# Render.com blueprint: one command (render blueprint launch) provisions the
# API + Postgres + Redis. Secrets (JWT_*, METALS_API_KEY, SMTP_*, TWILIO_*)
# must be set in the Render dashboard — they're marked sync:false below so
# Render prompts for them on first deploy.
services:
  - type: web
    name: agc-api
    runtime: docker
    repo: https://github.com/CHANGE_ME/agc-crm
    plan: starter
    region: oregon
    rootDir: .
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    autoDeploy: true
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 5
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: API_BASE_URL
        sync: false # e.g., https://agc-api.onrender.com
      - key: WEB_ORIGIN
        sync: false # e.g., https://agc.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: agc-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: agc-redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: METALS_API_KEY
        sync: false
      - key: METALS_API_URL
        value: https://api.metals.dev/v1/latest
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM
        sync: false

  - type: redis
    name: agc-redis
    plan: starter
    region: oregon
    ipAllowList: [] # private to services in the same region

databases:
  - name: agc-postgres
    databaseName: agc_crm
    user: agc
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: 16
