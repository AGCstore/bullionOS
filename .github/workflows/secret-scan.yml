name: secret-scan

# Runs gitleaks on every push + PR. Fails the build if any secret
# pattern matches — config at `.gitleaks.toml`. This is the canonical
# line of defense; the local pre-commit hook (package.json →
# simple-git-hooks) is a nice-to-have on top, but CI is what MUST
# green before a merge.
#
# History scope: scans the diff between the PR base and HEAD on PRs,
# and the push range on pushes. Avoids re-scanning the entire commit
# history on every run (the repo's past was manually vetted after the
# April 2026 rotation incident).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 lets gitleaks diff against prior commits on
          # push events; without it, a force-push could sneak a secret
          # into a commit that isn't the tip.
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          # Official action; reads .gitleaks.toml from the repo root.
          # No GITLEAKS_LICENSE needed for public repos; private orgs
          # can set GITLEAKS_LICENSE later if they hit the free-tier
          # rate limit (unlikely at this repo's push volume).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
