name: secret-scan

# Runs gitleaks on every push + PR. Fails the build if any secret
# pattern matches — config at `.gitleaks.toml`. This is the canonical
# line of defense; the local pre-commit hook (package.json →
# simple-git-hooks) is a nice-to-have on top, but CI is what MUST
# green before a merge.
#
# History scope: scans the diff between the PR base and HEAD on PRs,
# and the push range on pushes. Avoids re-scanning the entire commit
# history on every run (the repo's past was manually vetted after the
# April 2026 rotation incident).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install the gitleaks binary from the upstream release. We
      # deliberately AVOID gitleaks/gitleaks-action@v2 because it
      # gates private-org repos behind a paid license key, which
      # this repo (AGCstore org) does not have. The OSS binary is
      # free and equivalent in scanning behavior.
      #
      # Defensive extraction: download to a file first so a 404 is
      # caught loudly, extract the whole archive (gitleaks tarballs
      # contain README + LICENSE + binary at root, not a nested dir),
      # then locate the binary explicitly instead of assuming its
      # path.
      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION=8.24.0
          ARCHIVE="gitleaks_${VERSION}_linux_x64.tar.gz"
          URL="https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/${ARCHIVE}"
          echo "Downloading ${URL}"
          curl -fSL -o "/tmp/${ARCHIVE}" "${URL}"
          ls -lh "/tmp/${ARCHIVE}"
          mkdir -p /tmp/gitleaks-unpack
          tar -xzvf "/tmp/${ARCHIVE}" -C /tmp/gitleaks-unpack
          ls -la /tmp/gitleaks-unpack
          sudo install -m 0755 /tmp/gitleaks-unpack/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      # Scan the checked-out working tree. `--no-git` skips historical
      # archaeology that tends to surface stale false positives from
      # commits already past. What matters for us is "does the NEW
      # tip contain a secret?" — which is exactly what this checks.
      # Using `--exit-code 1` is the default but we set it explicitly
      # to make the failure contract obvious.
      - name: Run gitleaks
        run: |
          set -euo pipefail
          gitleaks detect \
            --source . \
            --no-git \
            --config .gitleaks.toml \
            --redact \
            --verbose \
            --no-banner \
            --exit-code 1
